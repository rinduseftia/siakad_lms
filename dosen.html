<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SIAKAD — Data Dosen</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght=600;700&family=DM+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --navy-deep: #0a1628;
        --navy-mid: #112240;
        --navy-light: #1a3a6b;
        --navy-accent: #1e4d8c;
        --gold: #c8a96e;
        --gold-light: #e8c98a;
        --white: #ffffff;
        --white-90: rgba(255, 255, 255, 0.9);
        --white-70: rgba(255, 255, 255, 0.7);
        --white-40: rgba(255, 255, 255, 0.4);
        --white-15: rgba(255, 255, 255, 0.15);
        --white-08: rgba(255, 255, 255, 0.08);
        --glass-bg: rgba(255, 255, 255, 0.09);
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        min-height: 100vh;
        font-family: "DM Sans", sans-serif;
        background: var(--navy-deep);
        color: var(--white);
        overflow: hidden;
        display: flex;
      }

      /* ── Background Canvas ── */
      .bg-canvas {
        position: fixed;
        inset: 0;
        z-index: -2;
        background:
          radial-gradient(
            ellipse 80% 60% at 20% 30%,
            rgba(30, 77, 140, 0.55) 0%,
            transparent 65%
          ),
          radial-gradient(
            ellipse 60% 50% at 80% 75%,
            rgba(17, 34, 64, 0.8) 0%,
            transparent 60%
          ),
          linear-gradient(150deg, #0a1628 0%, #112240 50%, #0d1e38 100%);
      }
      .bg-grid {
        position: fixed;
        inset: 0;
        z-index: -1;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
        background-size: 60px 60px;
      }
      .orb {
        position: fixed;
        border-radius: 50%;
        filter: blur(80px);
        pointer-events: none;
        z-index: -1;
      }
      .orb-1 {
        width: 420px;
        height: 420px;
        background: radial-gradient(
          circle,
          rgba(30, 77, 140, 0.45),
          transparent 70%
        );
        top: -100px;
        left: -100px;
      }
      .orb-2 {
        width: 350px;
        height: 350px;
        background: radial-gradient(
          circle,
          rgba(200, 169, 110, 0.18),
          transparent 70%
        );
        bottom: -80px;
        right: -80px;
      }

      /* ── Sidebar ── */
      .sidebar {
        width: 280px;
        background: var(--glass-bg);
        border-right: 1px solid rgba(255, 255, 255, 0.18);
        backdrop-filter: blur(28px) saturate(160%);
        -webkit-backdrop-filter: blur(28px) saturate(160%);
        padding: 40px 24px;
        display: flex;
        flex-direction: column;
        position: fixed;
        height: 100vh;
        left: 0;
        top: 0;
        z-index: 10;
      }
      .brand {
        font-family: "Playfair Display", serif;
        font-size: 24px;
        font-weight: 700;
        color: var(--white);
        margin-bottom: 40px;
        padding-bottom: 20px;
        border-bottom: 1px solid var(--white-15);
        text-align: center;
      }
      .brand span {
        color: var(--gold);
      }
      .menu-label {
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--white-40);
        margin-bottom: 12px;
        padding-left: 12px;
      }
      .nav-link {
        display: flex;
        align-items: center;
        padding: 14px 16px;
        color: var(--white-70);
        text-decoration: none;
        border-radius: 12px;
        margin-bottom: 8px;
        transition: all 0.3s ease;
        font-weight: 500;
      }
      .nav-link:hover,
      .nav-link.active {
        background: rgba(200, 169, 110, 0.15);
        color: var(--gold-light);
        box-shadow: inset 3px 0 0 var(--gold);
      }
      .logout-btn {
        margin-top: auto;
        background: rgba(229, 57, 53, 0.15);
        color: #ff8a80;
        border: 1px solid rgba(229, 57, 53, 0.3);
      }
      .logout-btn:hover {
        background: rgba(229, 57, 53, 0.3);
        color: white;
      }

      /* ── Main Content Layout ── */
      .main-content {
        margin-left: 280px;
        flex: 1;
        padding: 40px;
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .header-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 30px;
        animation: slideDown 0.5s ease-out;
        flex-shrink: 0;
      }
      .header-title h1 {
        font-family: "Playfair Display", serif;
        font-size: 32px;
        font-weight: 600;
      }
      .header-actions {
        display: flex;
        gap: 12px;
      }

      /* ── Buttons ── */
      .btn {
        padding: 10px 20px;
        border-radius: 8px;
        font-family: "DM Sans";
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        border: none;
      }
      .btn-add {
        background: var(--gold);
        color: var(--navy-deep);
        box-shadow: 0 4px 15px rgba(200, 169, 110, 0.3);
      }
      .btn-add:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(200, 169, 110, 0.5);
      }
      .btn-delete-bulk {
        background: rgba(229, 57, 53, 0.2);
        color: #ff8a80;
        border: 1px solid rgba(229, 57, 53, 0.4);
        display: none;
      }
      .btn-delete-bulk:hover {
        background: rgba(229, 57, 53, 0.4);
        color: white;
      }
      .btn-sm {
        padding: 6px 12px;
        font-size: 12px;
        border-radius: 6px;
      }
      .btn-edit {
        background: rgba(255, 255, 255, 0.1);
        color: white;
        border: 1px solid var(--white-15);
        margin-right: 5px;
      }
      .btn-edit:hover {
        background: rgba(255, 255, 255, 0.2);
        color: var(--gold);
      }
      .btn-del {
        background: rgba(229, 57, 53, 0.1);
        color: #ff8a80;
        border: 1px solid rgba(229, 57, 53, 0.3);
      }
      .btn-del:hover {
        background: rgba(229, 57, 53, 0.3);
        color: white;
      }

      /* ── Scrollable Table Area ── */
      .table-wrapper {
        background: var(--glass-bg);
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 20px;
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        box-shadow: 0 8px 32px rgba(10, 22, 40, 0.3);
        flex: 1;
        overflow-y: auto;
        animation: fadeIn 0.6s ease-out both;
        margin-bottom: 20px;
      }

      .table-wrapper::-webkit-scrollbar {
        width: 8px;
      }
      .table-wrapper::-webkit-scrollbar-track {
        background: transparent;
      }
      .table-wrapper::-webkit-scrollbar-thumb {
        background: rgba(200, 169, 110, 0.3);
        border-radius: 10px;
      }
      .table-wrapper::-webkit-scrollbar-thumb:hover {
        background: var(--gold);
      }

      table {
        width: 100%;
        border-collapse: collapse;
        text-align: left;
      }

      thead th {
        position: sticky;
        top: 0;
        background: #0f1d33;
        padding: 16px 20px;
        font-size: 12px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--gold-light);
        border-bottom: 1px solid var(--white-15);
        z-index: 5;
      }

      tbody td {
        padding: 16px 20px;
        font-size: 14px;
        color: var(--white-90);
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      }
      tbody tr {
        transition: background 0.2s;
      }
      tbody tr:hover {
        background: rgba(255, 255, 255, 0.04);
      }

      /* Status Badges */
      .status-badge {
        padding: 4px 10px;
        border-radius: 100px;
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
      }
      .status-aktif {
        background: rgba(76, 175, 80, 0.15);
        color: #81c784;
        border: 1px solid rgba(76, 175, 80, 0.3);
      }
      .status-nonaktif {
        background: rgba(255, 152, 0, 0.15);
        color: #ffb74d;
        border: 1px solid rgba(255, 152, 0, 0.3);
      }

      /* Custom Checkbox */
      .check-container {
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        height: 100%;
      }
      .check-container input {
        display: none;
      }
      .check-box {
        width: 18px;
        height: 18px;
        border-radius: 4px;
        border: 1px solid var(--white-40);
        background: rgba(255, 255, 255, 0.05);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s;
      }
      .check-container input:checked + .check-box {
        background: var(--gold);
        border-color: var(--gold);
      }
      .check-container input:checked + .check-box::after {
        content: "";
        width: 5px;
        height: 9px;
        border: 2px solid #0a1628;
        border-top: none;
        border-left: none;
        transform: rotate(45deg) translate(-1px, -1px);
      }

      /* Avatar Thumbnail Style */
      .avatar-thumb {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        object-fit: cover;
        border: 1px solid rgba(255, 255, 255, 0.2);
        background: rgba(255, 255, 255, 0.1);
        display: block;
        margin: 0 auto;
      }

      /* ── Pop-up Modal Form ── */
      .modal {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(10, 22, 40, 0.85);
        z-index: 100;
        backdrop-filter: blur(10px);
        align-items: center;
        justify-content: center;
      }
      .modal-content {
        background: #0f1d33;
        border: 1px solid rgba(255, 255, 255, 0.15);
        padding: 30px;
        border-radius: 16px;
        width: 500px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        max-height: 90vh;
        overflow-y: auto;
      }
      .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
      }
      .modal-header h2 {
        font-family: "Playfair Display", serif;
        font-size: 24px;
        color: var(--gold-light);
      }
      .modal-close {
        background: none;
        border: none;
        color: var(--white-40);
        font-size: 28px;
        cursor: pointer;
      }
      .modal-close:hover {
        color: #ff8a80;
      }

      .form-group {
        margin-bottom: 16px;
      }
      .form-group label {
        display: block;
        font-size: 12px;
        font-weight: 500;
        margin-bottom: 6px;
        color: var(--white-70);
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .form-control {
        width: 100%;
        padding: 10px 12px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid var(--white-15);
        border-radius: 6px;
        color: white;
        font-family: "DM Sans";
        font-size: 14px;
      }
      .form-control:focus {
        outline: none;
        border-color: var(--gold);
      }
      select.form-control option {
        background: #0f1d33;
        color: white;
      }

      /* Photo Upload Container */
      .photo-preview-container {
        display: flex;
        align-items: center;
        gap: 15px;
        margin-top: 5px;
      }
      .img-preview {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        object-fit: cover;
        border: 2px solid var(--gold);
        background: rgba(255, 255, 255, 0.05);
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes slideDown {
        from {
          opacity: 0;
          transform: translateY(-20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>

    <script>
      const role = (localStorage.getItem("role") || "mahasiswa").toLowerCase();
      const styleBlock = document.createElement("style");

      // PERBAIKAN: Penyesuaian ID Selector agar cocok dengan tombol Dosen
      if (role === "mahasiswa") {
        styleBlock.innerHTML =
          "#menu-mhs, #menu-dsn, #btnTambah, #thCheck, #thAksi { display: none !important; }";
      } else if (role === "dosen") {
        styleBlock.innerHTML =
          "#menu-dsn, #btnTambah, #thCheck, #thAksi { display: none !important; }";
      }

      document.head.appendChild(styleBlock);
    </script>
  </head>
  <body>
    <div class="bg-canvas"></div>
    <div class="bg-grid"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="sidebar">
      <div class="brand">SIAKAD <span>UNRI</span></div>

      <div class="menu-label">Menu Utama</div>
      <a href="dashboard.html" class="nav-link">Dashboard</a>

      <a href="mahasiswa.html" id="menu-mhs" class="nav-link">Mahasiswa</a>
      
      <a href="dosen.html" id="menu-dsn" class="nav-link active">Dosen</a>

      <a href="matakuliah.html" class="nav-link">Mata Kuliah</a>

      <div class="menu-label" style="margin-top: 24px">Pengaturan</div>
      <a
        href="#"
        onclick="alert('Halaman Change Password belum dibuat')"
        class="nav-link"
        >Change Password</a
      >
      <a href="#" onclick="logout()" class="nav-link logout-btn">Logout</a>
    </div>

    <div class="main-content">
      <div class="header-top">
        <div class="header-title">
          <h1>Data Dosen</h1>
        </div>
        <div class="header-actions">
          <button
            class="btn btn-delete-bulk"
            id="btnBulkDelete"
            onclick="deleteSelected()"
          >
            Hapus Terpilih
          </button>
          
          <button id="btnTambah" class="btn btn-add" onclick="openModal(false)">
            + Tambah Dosen
          </button>
        </div>
      </div>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th id="thCheck" style="width: 40px; text-align: center">
                <label class="check-container">
                  <input
                    type="checkbox"
                    id="checkAll"
                    onchange="toggleAll(this)"
                  />
                  <div class="check-box"></div>
                </label>
              </th>
              <th style="width: 60px; text-align: center">Foto</th>
              <th>NIDN</th>
              <th>Nama Dosen</th>
              <th>Email</th>
              <th>No. HP</th>
              <th>Status</th>
              
              <th id="thAksi" style="text-align: center; width: 160px">Aksi</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <tr>
              <td colspan="8" style="text-align: center">
                Memuat data dosen...
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <div id="dosenModal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h2 id="modalTitle">Tambah Dosen</h2>
          <button class="modal-close" onclick="closeModal()">&times;</button>
        </div>
        <form
          id="dosenForm"
          onsubmit="saveData(event)"
          enctype="multipart/form-data"
        >
          <input type="hidden" id="formAction" value="add" />
          <input type="hidden" id="dosenId" value="" />

          <div class="form-group">
            <label for="foto">Foto Profil</label>
            <div class="photo-preview-container">
              <img
                id="photoPreview"
                src="uploads/default.png"
                class="img-preview"
                alt="Preview"
              />
              <input
                type="file"
                id="foto"
                accept="image/*"
                class="form-control"
                onchange="previewImage(this)"
              />
            </div>
          </div>
          <div class="form-group">
            <label for="nidn">NIDN</label>
            <input
              type="text"
              id="nidn"
              class="form-control"
              required
              placeholder="10 Digit Angka NIDN"
            />
          </div>
          <div class="form-group">
            <label for="nama">Nama Lengkap</label>
            <input
              type="text"
              id="nama"
              class="form-control"
              required
              placeholder="Nama Lengkap & Gelar"
            />
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input
              type="email"
              id="email"
              class="form-control"
              placeholder="contoh@unri.ac.id"
            />
          </div>
          <div class="form-group">
            <label for="no_hp">No. Handphone</label>
            <input
              type="text"
              id="no_hp"
              class="form-control"
              placeholder="Contoh: 0812xxxxxxxx"
            />
          </div>
          <div class="form-group">
            <label for="status">Status</label>
            <select id="status" class="form-control" required>
              <option value="Aktif">Aktif</option>
              <option value="Tidak Aktif">Tidak Aktif</option>
            </select>
          </div>

          <button
            type="submit"
            class="btn btn-add"
            style="width: 100%; margin-top: 10px; padding: 12px"
          >
            Simpan Data
          </button>
        </form>
      </div>
    </div>

    <script>
      let dosenData = [];
      const currentRole = (localStorage.getItem("role") || "mahasiswa").toLowerCase();

      async function loadData() {
        try {
          const response = await fetch("api/dosen.php");
          if (!response.ok)
            throw new Error("Gagal memuat data atau sesi login habis.");

          dosenData = await response.json();
          renderTable();
        } catch (error) {
          console.error(error);
          const colSpanCount = currentRole === 'admin' ? 8 : 6;
          document.getElementById("tableBody").innerHTML =
            `<tr><td colspan="${colSpanCount}" style="text-align:center; color:#ff8a80;">Error: ${error.message}</td></tr>`;
        }
      }

      function renderTable() {
        const tbody = document.getElementById("tableBody");
        tbody.innerHTML = "";

        if (dosenData.length === 0) {
          const colSpanCount = currentRole === 'admin' ? 8 : 6;
          tbody.innerHTML = `<tr><td colspan="${colSpanCount}" style="text-align:center;">Tidak ada data dosen ditemukan.</td></tr>`;
          return;
        }

        dosenData.forEach((dsn, index) => {
          const statusClass =
            dsn.status && dsn.status === "Aktif"
              ? "status-aktif"
              : "status-nonaktif";
          const statusText = dsn.status || "Tidak Aktif";

          const fotoPath = dsn.foto ? dsn.foto : "uploads/default.png";

          const tr = document.createElement("tr");

          // PERBAIKAN: Rendering kolom dasar tanpa Checkbox dan tanpa Aksi dulu
          let rowHTML = `
            <td style="text-align: center;"><img src="${fotoPath}" class="avatar-thumb" alt="Profile"></td>
            <td style="font-family: monospace; font-weight: 600; color: var(--gold-light); letter-spacing: 0.5px;">${dsn.nidn}</td>
            <td style="font-weight: 500;">${dsn.nama}</td>
            <td style="color: var(--white-70); font-size: 13px;">${dsn.email || "-"}</td>
            <td>${dsn.no_hp || "-"}</td>
            <td><span class="status-badge ${statusClass}">${statusText}</span></td>
          `;

          // Jika role Admin, barulah kita sisipkan <td> Checkbox di kiri dan <td> Aksi di kanan
          if (currentRole === 'admin') {
            rowHTML = `
                <td style="text-align: center;">
                    <label class="check-container">
                        <input type="checkbox" class="check-item" value="${dsn.id}" onchange="checkSelection()">
                        <div class="check-box"></div>
                    </label>
                </td>
                ${rowHTML}
                <td style="text-align: center;">
                    <button class="btn btn-sm btn-edit" onclick="openModal(true, ${dsn.id})">Edit</button>
                    <button class="btn btn-sm btn-del" onclick="deleteSingle(${dsn.id})">Hapus</button>
                </td>
            `;
          }

          tr.innerHTML = rowHTML;
          tbody.appendChild(tr);
        });

        if (currentRole === 'admin') {
            document.getElementById("checkAll").checked = false;
            checkSelection();
        }
      }

      function previewImage(input) {
        if (input.files && input.files[0]) {
          const reader = new FileReader();
          reader.onload = function (e) {
            document.getElementById("photoPreview").src = e.target.result;
          };
          reader.readAsDataURL(input.files[0]);
        }
      }

      function openModal(isEdit = false, id = null) {
        if (currentRole !== 'admin') return; // Pengaman Tambahan
        const modal = document.getElementById("dosenModal");
        const form = document.getElementById("dosenForm");
        const actionInput = document.getElementById("formAction");
        const idInput = document.getElementById("dosenId");

        modal.style.display = "flex";

        if (isEdit) {
          document.getElementById("modalTitle").innerText = "Edit Data Dosen";
          actionInput.value = "edit";

          const dsn = dosenData.find((d) => parseInt(d.id) === parseInt(id));
          if (dsn) {
            idInput.value = dsn.id;
            document.getElementById("nidn").value = dsn.nidn;
            document.getElementById("nama").value = dsn.nama;
            document.getElementById("email").value = dsn.email || "";
            document.getElementById("no_hp").value = dsn.no_hp || "";
            document.getElementById("status").value = dsn.status || "Aktif";
            document.getElementById("photoPreview").src = dsn.foto
              ? dsn.foto
              : "uploads/default.png";
          }
        } else {
          document.getElementById("modalTitle").innerText = "Tambah Dosen";
          actionInput.value = "add";
          idInput.value = "";
          form.reset();
          document.getElementById("photoPreview").src = "uploads/default.png";
        }
      }

      function closeModal() {
        document.getElementById("dosenModal").style.display = "none";
      }

      async function saveData(event) {
        event.preventDefault();
        if (currentRole !== 'admin') return; // Pengaman Tambahan
        
        const action = document.getElementById("formAction").value;
        const id = document.getElementById("dosenId").value;

        const formData = new FormData();
        formData.append("nidn", document.getElementById("nidn").value);
        formData.append("nama", document.getElementById("nama").value);
        formData.append("email", document.getElementById("email").value);
        formData.append("no_hp", document.getElementById("no_hp").value);
        formData.append("status", document.getElementById("status").value);

        const fileInput = document.getElementById("foto");
        if (fileInput.files.length > 0) {
          formData.append("foto", fileInput.files[0]);
        }

        const url = action === "add" ? "api/dosen.php" : `api/dosen.php?id=${id}&_method=PUT`;

        try {
          const response = await fetch(url, {
            method: "POST",
            body: formData,
          });
          const result = await response.json();

          if (result.success || result.id) {
            closeModal();
            loadData();
          } else {
            alert("Gagal memproses data: " + result.error);
          }
        } catch (error) {
          console.error(error);
          alert("Gangguan koneksi ke server.");
        }
      }

      function toggleAll(source) {
        if (currentRole !== 'admin') return;
        const checkboxes = document.querySelectorAll(".check-item");
        checkboxes.forEach((cb) => (cb.checked = source.checked));
        checkSelection();
      }

      function checkSelection() {
        if (currentRole !== 'admin') return;
        const checkboxes = document.querySelectorAll(".check-item");
        const checkedCount = document.querySelectorAll(".check-item:checked").length;
        const btnBulkDelete = document.getElementById("btnBulkDelete");
        const checkAll = document.getElementById("checkAll");

        btnBulkDelete.style.display = checkedCount > 0 ? "inline-block" : "none";
        btnBulkDelete.innerText = `Hapus Terpilih (${checkedCount})`;
        checkAll.checked = checkedCount === checkboxes.length && checkboxes.length > 0;
      }

      async function deleteSelected() {
        if (currentRole !== 'admin') return;
        const checkedBoxes = document.querySelectorAll(".check-item:checked");
        const idsToDelete = Array.from(checkedBoxes).map((cb) => parseInt(cb.value));

        if (!confirm(`Hapus massal ${idsToDelete.length} dosen terpilih?`)) return;

        try {
          const response = await fetch("api/dosen.php", {
            method: "DELETE",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ ids: idsToDelete }),
          });
          const result = await response.json();
          if (result.success) loadData();
          else alert("Gagal: " + result.error);
        } catch (error) {
          alert("Gangguan koneksi.");
        }
      }

      async function deleteSingle(id) {
        if (currentRole !== 'admin') return;
        if (!confirm(`Hapus dosen dengan ID data ${id}?`)) return;

        try {
          const response = await fetch(`api/dosen.php?id=${id}`, {
            method: "DELETE",
          });
          const result = await response.json();
          if (result.success) loadData();
          else alert("Gagal: " + result.error);
        } catch (error) {
          alert("Gangguan koneksi.");
        }
      }

      function logout() {
        localStorage.clear();
        window.location.href = "index.html";
      }
      
      document.addEventListener("DOMContentLoaded", loadData);
    </script>
  </body>
</html>
